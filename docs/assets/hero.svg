<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#121536"/>
    </linearGradient>
    <radialGradient id="sphere" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#4f5ae0"/>
      <stop offset="100%" stop-color="#1e2360"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8f9bff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <g transform="translate(150,180)">
    <circle r="110" fill="url(#sphere)" opacity="0.95"/>
    <ellipse rx="110" ry="38" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.7"/>
    <ellipse rx="38" ry="110" stroke="#f472b6" stroke-width="2" fill="none" opacity="0.6"/>
    <line x1="0" y1="0" x2="64" y2="-78" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="64" cy="-78" r="8" fill="#fbbf24"/>
    <circle r="6" fill="#fff"/>
  </g>
  <text x="330" y="170" font-family="Inter,system-ui,sans-serif" font-size="76" font-weight="700" fill="url(#txt)">Quosmos</text>
  <text x="332" y="215" font-family="Inter,system-ui,sans-serif" font-size="24" fill="#94a3b8">Quantum computing, made visual and interactive.</text>
  <g font-family="JetBrains Mono,monospace" font-size="16" fill="#64748b">
    <text x="332" y="265">|ψ⟩ = cos(θ/2)|0⟩ + e^{iφ} sin(θ/2)|1⟩</text>
  </g>
</svg>
